<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vinícola Agnello | Portal Corporativo</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&display=swap");

    :root {
      --bg-overlay-a: rgba(17, 24, 39, 0.84);
      --bg-overlay-b: rgba(17, 24, 39, 0.92);
      --panel-bg: rgba(15, 23, 42, 0.74);
      --panel-border: rgba(255, 255, 255, 0.12);
      --text-main: #f8fafc;
      --text-soft: #d1d5db;
      --text-muted: #9ca3af;
      --gold-soft: #f5d38a;
      --wine-1: #7a1f2b;
      --wine-2: #b33951;
      --card-bg: rgba(255, 255, 255, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        linear-gradient(var(--bg-overlay-a), var(--bg-overlay-b)),
        url("https://images.unsplash.com/photo-1510812431401-41d2bd2722f3?auto=format&fit=crop&w=1600&q=80") center/cover no-repeat fixed;
      color: var(--text-main);
      padding: 28px;
    }

    .app-shell {
      max-width: 1280px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    /* Navegação principal do portal corporativo */
    .topbar {
      backdrop-filter: blur(10px);
      background: rgba(15, 23, 42, 0.78);
      border: 1px solid var(--panel-border);
      border-radius: 20px;
      padding: 16px 20px;
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .brand strong {
      font-family: "Cormorant Garamond", "Garamond", "Palatino Linotype", serif;
      font-size: 34px;
      font-weight: 700;
      letter-spacing: 0.5px;
      line-height: 0.95;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.35);
    }

    .brand span {
      color: var(--text-muted);
      font-size: 13px;
    }

    .menu {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .menu a {
      text-decoration: none;
      color: var(--text-main);
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.05);
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: bold;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    .menu a:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.1);
    }

    .menu a.active {
      background: linear-gradient(90deg, var(--wine-1), var(--wine-2));
      border-color: transparent;
    }

    .container {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
    }

    .left {
      padding: 50px;
      background:
        linear-gradient(rgba(36, 16, 22, 0.74), rgba(36, 16, 22, 0.84)),
        url("https://images.unsplash.com/photo-1506377247377-2a5b3b417ebb?auto=format&fit=crop&w=1200&q=80") center/cover no-repeat;
    }

    .right {
      padding: 50px;
      background: var(--panel-bg);
      border-left: 1px solid rgba(255, 255, 255, 0.10);
    }

    .badge {
      display: inline-block;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(214, 170, 91, 0.18);
      color: var(--gold-soft);
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 44px;
      line-height: 1.08;
      margin-bottom: 16px;
      max-width: 540px;
    }

    .subtitle {
      color: #e5e7eb;
      line-height: 1.7;
      font-size: 19px;
      max-width: 620px;
      margin-bottom: 24px;
    }

    .highlight {
      color: var(--gold-soft);
      font-weight: bold;
    }

    .integration-note {
      font-size: 14px;
      line-height: 1.6;
      color: #d1d5db;
      margin-bottom: 22px;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid rgba(245, 211, 138, 0.28);
      background: rgba(245, 211, 138, 0.08);
    }

    .module-links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .module-link {
      text-decoration: none;
      color: #fff;
      font-size: 15px;
      font-weight: bold;
      border-radius: 12px;
      padding: 12px 16px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.08);
      transition: background 0.15s ease, transform 0.15s ease;
    }

    .module-link:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.14);
    }

    .module-link.primary {
      background: linear-gradient(90deg, var(--wine-1), var(--wine-2));
      border-color: transparent;
    }

    .info-list {
      display: grid;
      gap: 14px;
    }

    .info-card {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 16px;
      padding: 16px;
    }

    .info-card strong {
      display: block;
      font-size: 20px;
      margin-bottom: 7px;
      color: #ffffff;
    }

    .info-card span {
      color: #e5e7eb;
      line-height: 1.6;
      font-size: 16px;
    }

    .panel {
      background: rgba(15, 23, 42, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.18);
    }

    .panel h2 {
      font-size: 34px;
      margin-bottom: 10px;
    }

    .panel p {
      color: var(--text-soft);
      line-height: 1.7;
      margin-bottom: 16px;
      font-size: 18px;
    }

    .form-group {
      margin-top: 16px;
    }

    label {
      display: block;
      font-size: 15px;
      margin-bottom: 9px;
      color: #e5e7eb;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.07);
      color: #fff;
      outline: none;
      font-size: 16px;
    }

    input::placeholder {
      color: #9ca3af;
    }

    .btn-primary {
      margin-top: 20px;
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(90deg, var(--wine-1), var(--wine-2));
      color: #fff;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .quick-access {
      margin-top: 14px;
      display: grid;
      gap: 10px;
    }

    .quick-access a {
      text-decoration: none;
      color: #e5e7eb;
      font-size: 14px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.05);
      display: block;
      text-align: center;
      transition: background 0.15s ease;
    }

    .quick-access a:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .result {
      margin-top: 20px;
      min-height: 130px;
      white-space: pre-line;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 16px;
      color: #e5e7eb;
      font-size: 16px;
      line-height: 1.7;
    }

    .note {
      margin-top: 14px;
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    @media (max-width: 1040px) {
      body {
        padding: 16px;
      }

      .panel h2 {
        font-size: 28px;
      }

      .panel {
        padding: 22px;
      }

      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    @media (max-width: 720px) {
      body {
        padding: 12px;
      }

      .topbar {
        padding: 14px;
      }

      .menu {
        width: 100%;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .menu a {
        text-align: center;
        font-size: 13px;
        padding: 10px 12px;
      }

      .panel {
        padding: 18px;
      }

      .panel h2 {
        font-size: 24px;
      }

      .brand strong {
        font-size: 30px;
      }
    }

    @media (max-width: 420px) {
      .menu {
        grid-template-columns: 1fr;
      }

      .brand strong {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <!-- Menu de navegação dos dois módulos do portal -->
    <header class="topbar">
      <div class="brand">
        <strong>Vinícola Agnello</strong>
      </div>
      <nav class="menu" aria-label="Navegação principal">
        <a class="active" href="index.html">Consulta de Pedidos</a>
        <a href="upload.html">Upload de Documentos</a>
      </nav>
    </header>

    <main class="container">
      <div class="panel">
        <h2>Consulta de pedidos</h2>
        <p>
          Digite o código do pedido para verificar o status comercial e a referência vinculada.
        </p>

        <div class="form-group">
          <label for="codigoPedido">Código do pedido</label>
          <input
            id="codigoPedido"
            type="text"
            maxlength="5"
            placeholder="Ex.: 10452"
          />
        </div>

        <button class="btn-primary" onclick="consultarPedido()">Consultar pedido</button>

        <div class="result" id="resultado">
          O status do pedido aparecerá aqui.
        </div>

        <div class="note">
          Portal interno destinado à equipe de vendas da Vinícola Agnello.
        </div>
      </div>
    </main>
  </div>

  <script>
    // =========================================================
    // CREDENCIAIS FALSAS E PROPOSITALMENTE EXPOSTAS NO FRONT-END
    // =========================================================
    // Estas credenciais são fake e existem apenas para teste
    // do scanner de segurança no GitHub Actions.

    const API_KEY = "TEST_API_KEY_123456789";
    const SECRET_KEY = "agnello_fake_secret_987654";
    const ACCESS_TOKEN = "agnello_demo_token_456123";
    const PASSWORD = "agnello_demo_password";

    async function consultarPedido() {
      const codigo = document.getElementById("codigoPedido").value.trim();
      const resultado = document.getElementById("resultado");

      if (!/^\d{5}$/.test(codigo)) {
        resultado.innerText = "O código do pedido deve conter exatamente 5 dígitos.";
        return;
      }

      resultado.innerText = "Consultando pedido...";

      try {
        // Chamada simulada para demonstração
        const response = await fetch(
          "https://jsonplaceholder.typicode.com/posts/" + codigo,
          {
            method: "GET",
            headers: {
              "Content-Type": "application/json",
              "x-api-key": API_KEY,
              "x-secret-key": SECRET_KEY,
              "Authorization": `Bearer ${ACCESS_TOKEN}`
            }
          }
        );

        const data = await response.json();

        resultado.innerText =
          "Pedido nº " + codigo + "\n" +
          "Status: Em separação\n" +
          "Canal: Equipe comercial\n" +
          "Cliente: Distribuidor Premium\n" +
          "Referência do pedido: " + data.title + "\n" +
          "Observação: Aguardando atualização logística.";
      } catch (error) {
        resultado.innerText = "Erro ao consultar o pedido.";
      }
    }
  </script>
</body>
</html>
