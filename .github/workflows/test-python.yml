name: DevSecOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  security-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: pip install openai

      - name: Criar pasta de relatórios
        run: mkdir -p reports

      - name: Rodar scanner
        run: python scan.py

      - name: Preparar entrada da IA
        run: python prepare_ai_input.py

      - name: Rodar análise com IA
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python ai_analysis.py

      - name: Salvar relatório final
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-final-ia
          path: reports/final_report.txt