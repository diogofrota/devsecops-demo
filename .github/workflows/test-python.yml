name: DevSecOps and CloudSecurity Pipeline

on:
  push:
    branches:
      - main

jobs:
  security-check:
    runs-on: ubuntu-latest
    env:
      REPORTS_DIR: ${{ runner.temp }}/security-reports

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: pip install openai

      - name: Rodar scanner DevSecOps
        run: python devSecOps/scan.py

      - name: Preparar entrada da IA DevSecOps
        run: python devSecOps/prepare_ai_input.py

      - name: Rodar análise IA DevSecOps
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python devSecOps/ai_analysis.py

      - name: Rodar scanner Cloud Security
        run: python cloudSecurity/cspm_scan.py

      - name: Preparar entrada da IA Cloud Security
        run: python cloudSecurity/prepare_ai_input.py

      - name: Rodar análise IA Cloud Security
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CLOUD_ASSISTANT_ID: ${{ secrets.CLOUD_ASSISTANT_ID }}
        run: python cloudSecurity/ai_analysis.py

      - name: Salvar relatórios
        uses: actions/upload-artifact@v4
        with:
          name: relatorios-seguranca
          path: |
            ${{ env.REPORTS_DIR }}/final_report.txt
            ${{ env.REPORTS_DIR }}/cloud_final_report.txt
            ${{ env.REPORTS_DIR }}/credential_report.json
            ${{ env.REPORTS_DIR }}/cloud_report.json

      - name: Enviar relatórios por e-mail
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python send_email.py
