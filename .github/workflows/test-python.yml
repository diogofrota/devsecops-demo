name: Test Python Script

on:
  push:
  workflow_dispatch:

jobs:
  run-python:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Rodar scanner de segurança
        run: python scan.py

      - name: Preparar entrada para agente de IA
        run: python prepare_ai_input.py

      - name: Gerar resumo da execução
        run: |
          echo "## Relatório da varredura" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- O scanner verificou o repositório em busca de credenciais expostas." >> $GITHUB_STEP_SUMMARY
          echo "- O relatório detalhado foi salvo como artifact." >> $GITHUB_STEP_SUMMARY
          echo "- O arquivo de entrada para IA também foi gerado." >> $GITHUB_STEP_SUMMARY

      - name: Salvar relatório de segurança
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-seguranca
          path: reports/credential_report.json

      - name: Salvar entrada da IA
        uses: actions/upload-artifact@v4
        with:
          name: entrada-ia
          path: reports/ai_input.txt